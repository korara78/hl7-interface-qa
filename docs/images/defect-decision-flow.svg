<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a5568"/>
    </marker>
  </defs>

  <rect x="360" y="20" width="180" height="55" rx="10" fill="#edf2f7" stroke="#4a5568" stroke-width="2"/>
  <text x="450" y="53" font-size="14" font-weight="bold" text-anchor="middle" fill="#2d3748">Incoming message</text>

  <!-- PID-3 -->
  <rect x="60" y="140" width="220" height="70" rx="10" fill="#fff5f5" stroke="#e53e3e" stroke-width="2"/>
  <text x="170" y="168" font-size="13" font-weight="bold" text-anchor="middle" fill="#822727">PID-3 blank?</text>
  <text x="170" y="188" font-size="11" text-anchor="middle" fill="#4a5568">(ADT / ORM)</text>

  <rect x="30" y="270" width="150" height="60" rx="10" fill="#742a2a"/>
  <text x="105" y="298" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Filter: Reject</text>
  <text x="105" y="315" font-size="10" text-anchor="middle" fill="#fed7d7">no safe guess for a missing MRN</text>

  <!-- OBR-4 -->
  <rect x="340" y="140" width="220" height="70" rx="10" fill="#faf5ff" stroke="#805ad5" stroke-width="2"/>
  <text x="450" y="168" font-size="13" font-weight="bold" text-anchor="middle" fill="#553c9a">OBR-4 blank?</text>
  <text x="450" y="188" font-size="11" text-anchor="middle" fill="#4a5568">(ORM only)</text>

  <rect x="320" y="270" width="260" height="70" rx="10" fill="#553c9a"/>
  <text x="450" y="298" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Transformer: flag isException</text>
  <text x="450" y="316" font-size="10" text-anchor="middle" fill="#e9d8fd">routes to Exception_Log, not the lab</text>

  <!-- OBX-11 -->
  <rect x="640" y="140" width="220" height="70" rx="10" fill="#f0fff4" stroke="#38a169" stroke-width="2"/>
  <text x="750" y="168" font-size="13" font-weight="bold" text-anchor="middle" fill="#276749">OBX-11 missing?</text>
  <text x="750" y="188" font-size="11" text-anchor="middle" fill="#4a5568">(ORU only)</text>

  <rect x="640" y="270" width="220" height="70" rx="10" fill="#276749"/>
  <text x="750" y="295" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Transformer: default to P</text>
  <text x="750" y="313" font-size="10" text-anchor="middle" fill="#c6f6d5">never defaults to F (Final)</text>

  <line x1="450" y1="75" x2="170" y2="135" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow4)"/>
  <line x1="450" y1="75" x2="450" y2="135" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow4)"/>
  <line x1="450" y1="75" x2="750" y2="135" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow4)"/>

  <line x1="140" y1="210" x2="110" y2="265" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow4)"/>
  <line x1="450" y1="210" x2="450" y2="265" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow4)"/>
  <line x1="750" y1="210" x2="750" y2="265" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow4)"/>

  <text x="450" y="375" font-size="12" text-anchor="middle" fill="#718096">Reject when there's no safe guess. Default only when there's a defensible, low-risk fallback.</text>
</svg>
