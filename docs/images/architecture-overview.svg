<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- Docker boundary -->
  <rect x="20" y="20" width="860" height="300" rx="12" fill="none" stroke="#a0aec0" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="40" y="45" font-size="14" fill="#718096">Docker container: myconnect (Mirth Connect 4.5.2)</text>

  <!-- Mock Hospital -->
  <rect x="50" y="120" width="170" height="90" rx="10" fill="#ebf8ff" stroke="#3182ce" stroke-width="2"/>
  <text x="135" y="155" font-size="15" font-weight="bold" text-anchor="middle" fill="#2c5282">Mock Hospital</text>
  <text x="135" y="175" font-size="12" text-anchor="middle" fill="#2c5282">File Reader &#8594; TCP Sender</text>
  <text x="135" y="192" font-size="11" text-anchor="middle" fill="#4a5568">sends ADT / ORM</text>

  <!-- Channel 1 -->
  <rect x="290" y="60" width="200" height="90" rx="10" fill="#f0fff4" stroke="#38a169" stroke-width="2"/>
  <text x="390" y="90" font-size="14" font-weight="bold" text-anchor="middle" fill="#276749">Hospital_to_Lab_ADT_ORM</text>
  <text x="390" y="110" font-size="11" text-anchor="middle" fill="#4a5568">TCP Listener :6661</text>
  <text x="390" y="127" font-size="11" text-anchor="middle" fill="#4a5568">Filter + Transformer</text>

  <!-- Mock Lab -->
  <rect x="600" y="120" width="180" height="90" rx="10" fill="#fffaf0" stroke="#dd6b20" stroke-width="2"/>
  <text x="690" y="155" font-size="15" font-weight="bold" text-anchor="middle" fill="#9c4221">Mock Lab</text>
  <text x="690" y="175" font-size="12" text-anchor="middle" fill="#9c4221">TCP Listener :6662</text>
  <text x="690" y="192" font-size="11" text-anchor="middle" fill="#4a5568">receives orders</text>

  <!-- Channel 2 -->
  <rect x="290" y="210" width="200" height="90" rx="10" fill="#fff5f5" stroke="#e53e3e" stroke-width="2"/>
  <text x="390" y="240" font-size="14" font-weight="bold" text-anchor="middle" fill="#822727">Lab_Receives_ADT_ORM</text>
  <text x="390" y="260" font-size="11" text-anchor="middle" fill="#4a5568">also accepts ORU direct</text>
  <text x="390" y="277" font-size="11" text-anchor="middle" fill="#4a5568">Transformer (OBX-11 default)</text>

  <!-- Exception Log -->
  <rect x="600" y="240" width="180" height="60" rx="10" fill="#faf5ff" stroke="#805ad5" stroke-width="2"/>
  <text x="690" y="265" font-size="13" font-weight="bold" text-anchor="middle" fill="#553c9a">Exception_Log</text>
  <text x="690" y="283" font-size="11" text-anchor="middle" fill="#4a5568">flagged messages only</text>

  <!-- Arrows -->
  <line x1="220" y1="150" x2="285" y2="115" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="105" x2="595" y2="150" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="130" x2="595" y2="255" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="210" x2="495" y2="250" stroke="#4a5568" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <text x="450" y="325" font-size="12" text-anchor="middle" fill="#718096">One mock patient, one order ID, threaded end-to-end across ADT &#8594; ORM &#8594; ORU</text>
</svg>
